# Auctify — Bahasa Indonesia Locale File (id)
# ═══════════════════════════════════════════════════════════════════════════════
# 
# Variabel yang tersedia:
#   {item}        - Nama/material item
#   {amount}      - Jumlah/quantity
#   {winner}      - Username pemenang
#   {tax}         - Persentase pajak
#   {net}         - Jumlah bersih setelah pajak
#   {listing_id}  - ID lelang
#   {min_bid}     - Minimum bid
#   {max}         - Nilai maksimum
#   {price}       - Harga
#   {buyer}       - Username pembeli
#   {seller}      - Username penjual
#   {payment}     - Jumlah pembayaran
#   {count}       - Jumlah/angka
#   {stacks}      - Jumlah stack
#   {player}      - Nama player
#   {id}          - ID umum
#   {date}        - String tanggal
#
# ═══════════════════════════════════════════════════════════════════════════════

