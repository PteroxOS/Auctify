# ─────────────────────────────────────────────
#  METRICS (bStats)
# ─────────────────────────────────────────────
metrics:
  # Enable anonymous usage statistics via bStats?
  # This helps plugin development by providing data like:
  # server version, plugin version, language, storage type
  # No personal data is collected. Default: false (requires bStats shading)
  enabled: false

# ─────────────────────────────────────────────
#  DEPENDENCY SETTINGS
# ─────────────────────────────────────────────
dependencies:
  # Should Auctify automatically download missing dependencies (like Vault)?
  # If disabled, you must install dependencies manually.
  # Downloaded jars will be placed in your server's /plugins folder.
  auto-download: true

# ─────────────────────────────────────────────
#  GENERAL SETTINGS
# ─────────────────────────────────────────────
general:
  # Language file to use from the 'locales' folder (without .yml)
  # Available: en, id, es, pt_br, ru, de, fr, pl, tr, zh_cn, ja, ko, nl
  language: "en"

  # Plugin language prefix shown before all messages
  prefix: "§8[§6Auctify§8] §r"

  # Default auction duration in seconds when seller doesn't specify
  # 300 = 5 minutes | 600 = 10 minutes | 3600 = 1 hour
  default-duration: 300

  # Maximum auction duration a player can set (in seconds)
  max-duration: 3600

  # Minimum auction duration allowed (in seconds)
  min-duration: 60

  # Maximum number of active listings a single player can have simultaneously
  # Players with 'auctify.bypass.maxlistings' ignore this
  max-listings-per-player: 5

  # Should Auctify broadcast bid updates to all online players?
  # Set to false on large servers to reduce chat spam
  broadcast-bids: true

  # Should Auctify broadcast when a new listing is created?
  broadcast-listings: true

  # Should Auctify broadcast when an auction is won?
  broadcast-wins: true

# ─────────────────────────────────────────────
#  PER-WORLD SETTINGS
# ─────────────────────────────────────────────

# Per-World Auction House Support
worlds:
  # Mode: "global" = all worlds share same auction house
  #       "per-world" = each world has separate auction house
  #       "blacklist" = use global but disable in specific worlds
  mode: "global"
  
  # For "per-world" mode: list worlds that share a global auction
  # Leave empty for completely separate per-world auctions
  global-worlds: []
  
  # For "blacklist" mode: worlds where auction house is disabled
  # Players in these worlds cannot use /ac commands
  blacklisted-worlds: []

# ─────────────────────────────────────────────
#  ITEM BLACKLIST SETTINGS (Admin Only)
# ─────────────────────────────────────────────

# Prevent certain item types from being listed
blacklist:
  # List of materials that cannot be sold (use Material enum names)
  # Examples: BARRIER, BEDROCK, COMMAND_BLOCK, STRUCTURE_BLOCK
  materials: []
  
  # Permission to bypass blacklist (for admins)
  bypass-permission: "auctify.admin.blacklist.bypass"

# ─────────────────────────────────────────────
#  BIDDING SETTINGS
# ─────────────────────────────────────────────
bidding:
  # Minimum amount a new bid must exceed the current highest bid by
  # Example: current bid is 1000, min-increment is 10 → next bid must be at least 1010
  min-increment: 10

  # Minimum starting price a seller can set
  min-start-price: 1.0

  # Maximum starting price a seller can set (set to -1 for no limit)
  max-start-price: 1000000.0

  # Allow a seller to set a "buyout" price? (instant-win price)
  allow-buyout: true

  # Minimum buyout price must be higher than start price by at least this multiplier
  # Example: start = 100, multiplier = 1.5 → buyout must be at least 150
  buyout-min-multiplier: 1.5

# ─────────────────────────────────────────────
#  GUI SETTINGS
# ─────────────────────────────────────────────
gui:
  # Title shown at the top of the auction house inventory
  title: "§8✦ §6Auctify §8— §7Auction House §8✦"

  # Number of rows in the GUI (must be 3, 4, 5, or 6)
  rows: 6

  # Material used as filler in empty GUI slots
  filler-material: GRAY_STAINED_GLASS_PANE

  # Should the GUI auto-refresh every N seconds while open?
  # Set to 1 for real-time countdown timer. Higher values = less CPU usage.
  auto-refresh: true
  auto-refresh-interval: 1

  # Items per page (calculated automatically from rows, but can be overridden)
  # Leave as -1 to auto-calculate (rows * 9 minus the bottom navigation row)
  items-per-page: -1

  # Navigation row items (bottom row of GUI)
  navigation:
    previous-page-slot: 45
    search-button-slot: 48
    info-slot: 49
    next-page-slot: 53
  
  # GUI button slots (row 5 - second to last row)
  buttons:
    category-cycle-slot: 47
    claim-slot: 46
    history-slot: 51
    sort-slot: 52
    refresh-slot: 48
    watchlist-slot: 50

  # Bid input timeout in seconds (how long a player has to type their bid in chat)
  # After this time, the input session is automatically cancelled
  bid-input-timeout: 30  # 🔧 CONFIGURABLE

# ─────────────────────────────────────────────
#  LISTING DISPLAY SETTINGS
# ─────────────────────────────────────────────
display:
  # Lore lines added to each item in the GUI (supports color codes and placeholders)
  # Placeholders: {seller}, {start_price}, {current_bid}, {buyout}, {buyout_price}, {top_bidder}, {time_left}, {listing_id}
  lore:
    - "§8────────────────────"
    - "§7Seller§8: §f{seller}"
    - "§7Start price§8: §a{start_price}"
    - "§7Current bid§8: §a{current_bid}"
    - "§7Buyout§8: §c{buyout}"
    - "§7Top bidder§8: §e{top_bidder}"
    - "§7Time left§8: §f{time_left}"
    - "§7Listing ID§8: §8{listing_id}"
    - "§8────────────────────"
    - "§7Left-click §8» §fPlace a bid"
    - "§7Right-click §8» §fView item details"

  # Lore line shown when nobody has bid yet
  no-bidder-placeholder: "§7No bids yet"

  # Time format for {time_left} placeholder
  # Use: {h} hours, {m} minutes, {s} seconds
  time-format: "§c{m}m {s}s"

# ─────────────────────────────────────────────
#  SYSTEM SETTINGS
# ─────────────────────────────────────────────
system:
  # First-run flag (DO NOT EDIT - set automatically)
  # When true, setup wizard will prompt admins on next startup
  first-run: true

# ─────────────────────────────────────────────
#  SOUND EFFECTS
# ─────────────────────────────────────────────
sounds:
  # Enable sound effects for auction events?
  enabled: true
  # Sounds enhance UX: bid success, auction won, outbid alerts, etc.

# ─────────────────────────────────────────────
#  NOTIFICATIONS
# ─────────────────────────────────────────────
notifications:
  # Enable notification sounds
  sound: true
  # Notification sound volume (0.0 to 1.0)
  volume: 0.5
  # Notification sound pitch (0.5 to 2.0)
  pitch: 1.0
  # Expiration warning notification (minutes before auction ends)
  expiration-warning-minutes: 5

# ─────────────────────────────────────────────
#  AUTO-BID
# ─────────────────────────────────────────────
autobid:
  # Enable auto-bid feature?
  enabled: true
  # Maximum auto-bids per player
  max-per-player: 10
  # Minimum bid increment for auto-bids
  min-increment: 1.0

# ─────────────────────────────────────────────
#  PRICE HISTORY
# ─────────────────────────────────────────────
price-history:
  # Enable price history tracking?
  enabled: true
  # How many days to keep price history records
  retention-days: 30
  # Maximum price history entries per item type
  max-entries-per-item: 100

# ─────────────────────────────────────────────
#  ALERTS (Title & Action Bar)
# ─────────────────────────────────────────────
alerts:
  # Title alerts for major events (auction won, sold, outbid)
  titles:
    enabled: true
  # Action bar notifications for auction activity
  actionbar:
    enabled: true
  # Broadcast high-value listings (expensive items)
  broadcast-high-value: true
  # Minimum price to trigger high-value broadcast
  high-value-threshold: 10000

# ─────────────────────────────────────────────
#  BUY ORDERS (Want-to-Buy / WTB System)
# ─────────────────────────────────────────────
buyorders:
  # Enable the buy order system?
  enabled: true
  # Default duration for buy orders (in seconds)
  # Default: 7 days (604800 seconds)
  duration: 604800
  # Maximum buy orders per player
  max-per-player: 5

# ─────────────────────────────────────────────
#  BULK SELLING
# ─────────────────────────────────────────────
bulksell:
  # Enable bulk selling feature?
  enabled: true
  # Maximum number of stacks to list at once
  max-stacks: 9

# ─────────────────────────────────────────────
#  STORAGE SETTINGS
# ─────────────────────────────────────────────
storage:
  # Storage type for auction data
  # Options: "memory" (resets on restart), "sqlite" (file-based), "mysql" (recommended for production)
  type: sqlite

  # SQLite settings (only used if type is "sqlite")
  sqlite:
    file: "auctify.db"

    # Automatic backup settings (prevents data loss)
    backup:
      # Enable automatic backups?
      enabled: true

      # Backup interval in minutes (0 = disabled, only manual backup)
      # Default: 60 minutes (1 hour)
      interval: 60

      # Maximum number of backup files to keep
      # Old backups are automatically deleted
      # Default: 10 (keeps 10 most recent backups)
      keep-count: 10

  # MySQL settings (only used if type is "mysql")
  mysql:
    host: "localhost"
    port: 3306
    database: "auctify"
    username: "root"
    password: "password"
    pool-size: 10
    use-ssl: false

  # Auto-save interval in minutes (0 = disabled)
  # Periodically saves all active listings to ensure data safety on crash
  auto-save-interval: 5

  # Timer mode: auction timers only count down while the server is running.
  # If the server shuts down, remaining time is saved and resumed on next startup.

# ─────────────────────────────────────────────
#  AUCTION BEHAVIOR SETTINGS
# ─────────────────────────────────────────────

# Auction Extension (sellers can extend time if no bids)
extension:
  # Maximum minutes a seller can extend their auction
  max-minutes: 60

# Sniping Protection (auto-extend when bid placed near end)
sniping-protection:
  # Auto-extend auction when bid placed in last X seconds (0 = disabled)
  threshold-seconds: 30
  # How many seconds to extend when sniping detected
  extend-seconds: 30

# Auto-Relist (automatically relist expired auctions with no bids)
auto-relist:
  enabled: false
  # Discount percentage for relisted items (10 = 10% off)
  discount-percent: 10
  # Maximum relist attempts per auction
  max-attempts: 3

# ─────────────────────────────────────────────
#  FEE & TAX SETTINGS
# ─────────────────────────────────────────────

# Listing Fee (charged when creating a listing, 0 = disabled)
listing-fee:
  enabled: false
  # Percentage of start price (e.g., 5 = 5% fee)
  percent: 0
  # Minimum fee amount (even if percentage is lower)
  min: 0
  # Maximum fee amount (0 = unlimited)
  max: 0

# Sales Tax (deducted from seller when item sells)
tax:
  # Tax percentage (0 = disabled)
  percent: 0
  # Where tax money goes: "void" (disappears) or "server-account" (to server)
  destination: "void"

# ─────────────────────────────────────────────
#  DISCORD WEBHOOK SETTINGS
# ─────────────────────────────────────────────

discord:
  # Main webhook for auction events
  enabled: false
  webhook-url: "https://discord.com/api/webhooks/..."
  
  # Fired when a new item is listed
  on-new-listing:
    enabled: true
    title: "New Auction Listing!"
    color: 3447003 # Blue
    
  # Fired when an item is sold
  on-sale:
    enabled: true
    title: "Item Sold!"
    color: 3066993 # Green
  
  # Fired when an auction ends without bids
  on-expire:
    enabled: true
    title: "Auction Expired"
    color: 10070709 # Gray
  
  # Crash Notifications (separate webhook for error alerts)
  crash-webhook:
    enabled: false
    url: "https://discord.com/api/webhooks/..."

# ─────────────────────────────────────────────
#  PERMISSION OVERRIDES
# ─────────────────────────────────────────────

# Listing limits by permission node:
#   auctify.listings.5      = 5 listings max
#   auctify.listings.10     = 10 listings max
#   auctify.listings.unlimited = unlimited listings
# Operators (op) always have unlimited listings

# End of Configuration
